<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="/favicon.ico" sizes="any"/>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml"/>
  <link rel="apple-touch-icon" href="/favicon-180x180.png"/>
  <link rel="manifest" href="/site.webmanifest"/>
  <meta name="theme-color" content="#008c89"/>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kopanow — Device identifiers</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="di-shell">
    <header class="di-top">
      <div>
        <h1>Device identifiers</h1>
        <p class="di-muted">Completed cash-disbursement customers: device_id, IMEI(s), and hardware serial.</p>
      </div>
      <div class="di-row" style="min-width: 220px">
        <label class="di-label" for="admin-key">x-admin-key (ADMIN_KEY)</label>
        <input type="password" id="admin-key" class="di-input" placeholder="Paste admin key" autocomplete="off" />
      </div>
    </header>

    <div id="di-error" class="di-error" hidden></div>

    <section class="di-card">
      <div class="di-toolbar">
        <div class="di-row">
          <label class="di-label" for="search">Search</label>
          <input type="search" id="search" class="di-input" placeholder="borrower, loan, IMEI, serial…" />
        </div>
        <div class="di-actions">
          <button type="button" class="di-btn" id="btn-refresh">Refresh</button>
          <button type="button" class="di-btn di-btn--accent" id="btn-export">Download CSV</button>
        </div>
      </div>
      <p class="di-muted" id="di-summary">—</p>
      <div class="di-table-wrap">
        <table class="di-table" id="tbl-identifiers">
          <thead>
            <tr>
              <th>Borrower</th>
              <th>Loan</th>
              <th>device_id</th>
              <th>IMEI</th>
              <th>All IMEIs</th>
              <th>Serial</th>
              <th>Model</th>
              <th>Updated</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      <div class="di-actions" style="margin-top: 1rem">
        <button type="button" class="di-btn" id="btn-prev">Previous</button>
        <button type="button" class="di-btn" id="btn-next">Next</button>
      </div>
    </section>
  </div>
  <script src="app.js"></script>
</body>
</html>
